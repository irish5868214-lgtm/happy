<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cutie Quiz</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --main-bg: #fffafe;
      --quiz-bg: #fff7fb;
      --accent1: #ffe9f3;
      --accent2: #d4f6f7;
      --accent3: #fef6ef;
      --button: #fdaecb;
      --button-hover: #fd8bb3;
      --shadow: 0 4px 24px 0 rgba(222,194,242,0.17);
      --correct: #affdb2;
      --wrong: #ffdad1;
      --danger: #f76363;
    }
    html, body { height: 100%; }
    * { box-sizing: border-box;}
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--main-bg);
      font-family: 'Poppins', Arial, sans-serif;
      color: #7b5873;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .container {
      background: var(--quiz-bg);
      max-width: 400px;
      margin: 38px auto 0 auto;
      padding: 2rem 1.2rem 2rem 1.2rem;
      border-radius: 30px;
      box-shadow: var(--shadow);
      width: 100%;
      min-height: 19.5rem; 
      transition: background 0.2s;
    }
    @media (max-width: 540px) {
      .container { max-width: 96vw; margin: 8vw 2vw 0 2vw; padding: 1.2rem 0.3rem 2rem 0.3rem;}
    }
    .hidden { display: none;}
    .passcode-input {
      width: 100%;
      padding: 1rem 1rem;
      font-size: 1.1rem;
      border-radius: 13px;
      border: 1.5px solid #f7c9e0;
      background: var(--accent1);
      outline: none;
      margin-bottom: 1rem;
      color: #bb70a3;
      transition: border-color 0.18s;
    }
    .passcode-input:focus {
      border-color: #fc9cca;
    }
    .passcode-error {
      color: var(--danger);
      font-size: 0.97em;
      margin-bottom: 1em;
      margin-top: -0.45em;
      text-align: center;
      min-height: 24px;
      font-weight: 600;
      letter-spacing: .01em;
      transition: opacity 0.18s;
      opacity: 1;
    }
    .button {
      display: block;
      margin: 0 auto 0 auto;
      background: var(--button);
      border: none;
      color: white;
      font-size: 1.16rem;
      font-weight: 700;
      padding: 0.74rem 2.2rem;
      border-radius: 14px;
      box-shadow: 0 2px 12px #ffc7fa46;
      cursor: pointer;
      margin-top: 0.2rem;
      transition: background 0.18s, transform 0.14s;
      letter-spacing: .03em;
    }
    .button:hover {
      background: var(--button-hover);
      transform: scale(1.06);
    }
    .quiz-question {
      font-size: 1.09rem;
      font-weight: bold;
      margin-bottom: 1.2rem;
      color: #b859a7;
      letter-spacing: -.03em;
    }
    .options-list {
      list-style: none;
      padding: 0;
      margin-bottom: 2rem;
    }
    .option-row {
      background: linear-gradient(90deg,#f9e3f6 0%,#faf6fd 100%);
      margin-bottom: 1rem;
      border-radius: 12px;
      padding: 0.78rem 1.1rem;
      cursor: pointer;
      border: 2px solid transparent;
      user-select: none;
      box-shadow: 0 2px 12px #ffc7fa1a;
      transition: background 0.13s, border 0.14s, transform 0.10s;
      font-size: 1.06em;
      color: #5d5385;
    }
    .option-row.selected {
      border: 2px solid var(--button);
      background: #fde9f9;
      color: #be57a7;
      font-weight: 700;
      transform: scale(1.03);
      letter-spacing: -.01em;
    }
    .option-row:active {
      background: #fcdef5;
      color: #c77fd3;
    }
    .result-frame {
      text-align: center;
      margin-top: 1.1rem;
      padding: 1.2rem 0.7rem 1.3rem 0.7rem;
      border-radius: 26px;
      background: linear-gradient(110deg, #fff3fd 0%, #e9f1ff 100%);
      box-shadow: 0 2px 24px #e9bfff23;
      border: 4px dashed #f7c7ff6b;
      position: relative;
      min-height: 250px;
      max-width: 325px;
      margin-left:auto;
      margin-right:auto;
    }
    .result-title {
      font-size: 1.2rem;
      font-weight:700;
      color: #f973b4;
      margin-bottom: 0.5rem;
      letter-spacing:-.02em;
      text-shadow: 0 1px 11px #ffd6e885;
    }
    .result-desc {
      font-size:1.02rem;
      color: #745f7a;
      margin-bottom:0.8em;
    }
    .result-gif {
      margin: 0.6rem auto 0.89rem auto;
      border-radius: 20px;
      box-shadow: 0 2px 14px #fff0fb;
      width: 98px;
      height: 98px;
      display: block;
      object-fit: cover;
      border: 5px solid #fff7f2;
      background: #ffd8ef93;
      position: relative;
      z-index: 1;
      animation: bounce 0.9s;
    }
    @keyframes bounce {
      0% { transform: scale(.7);}
      50% { transform: scale(1.08);}
      100%{ transform: scale(1);}
    }
    @media (max-width:600px){
      .result-frame{
        padding:.7rem .11rem 1.1rem .11rem;
        max-width:90vw;
        border-width: 3px;
      }
      .result-gif{width:76px; height:76px;}
    }
    .small {
      font-size:0.97em;
      opacity:0.77;
      color:#ad90c7;
      margin-top:1.2em;
      text-align:center;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container" id="passcode-container">
    <div class="quiz-question" style="color:#f373c9;text-align:center">🔒 Passcode ဖြည့်ပါ</div>
    <input id="passcode-input" maxlength="10" class="passcode-input" type="text" placeholder="Passcode...">
    <div class="passcode-error" id="passcode-error"></div>
    <button class="button" onclick="checkPass()">Enter</button>
    <div class="small">eg : 67 / ily</div>
  </div>

  <div class="container hidden" id="quiz-container">
    <div id="quiz-content"></div>
    <div style="display:flex;justify-content:center;">
      <button class="button" id="check-btn" style="display:none;" onclick="showResult()">✅ Check</button>
    </div>
  </div>

  <div class="container hidden" id="result-container">
    <div class="result-frame" id="result-frame">
      <!-- result here -->
    </div>
  </div>

  <script>
    const quizData = [
      {
        q: "မောင်တို့စသိတဲ့ ရက်ကိုရွေးပါ",
        opts: ["ဖေဖော်ဝါရီလ", "နိုဝင်ဘာလ", "ဇွန်လ"],
        correct: 1,
      },
      {
        q: "မောင့်အကြိုက်ဆုံးအရောင်ကိုရွေးပါ?",
        opts: ["အနီ", "အနက်", "အပြာ"],
        correct: 2
      },
      {
        q: "မောင့်အကြိုက်ဆုံးသောအသားကဘာလဲ?",
        opts: ["ကြက်သား", "ဆိတ်သား", "၀က်သား"],
        correct: 2
      },
      {
        q: "မောင်တို့ first date ကဘယ်မှာလဲ ?",
        opts: ["Movie date", "Picnic date", "Photobooth date"],
        correct: 0
      },
      {
        q: "မောင့်ကိုစတွေ့တုန်းက မောင် အင်္ကျီဘာအရောင်၀တ်ထားတာလဲ?",
        opts: ["အနီ", "အနက်", "အပြာ"],
        correct: 1
      }
    ];
    let answers = new Array(quizData.length).fill(null);

    function checkPass() {
      const errorDiv = document.getElementById('passcode-error');
      const v = document.getElementById('passcode-input').value.trim().toLowerCase();
      if (v === "67" || v === "ily") {
        errorDiv.textContent = "";
        showQuiz();
      } else {
        errorDiv.textContent = "Passcode မှားနေသည်!";
        document.getElementById('passcode-input').value = "";
        document.getElementById('passcode-input').focus();
      }
    }

    function showQuiz() {
      document.getElementById('passcode-container').classList.add("hidden");
      const qz = document.getElementById('quiz-container');
      qz.classList.remove("hidden");
      let html = '';
      quizData.forEach((q, idx) => {
        html += `
          <div class="quiz-question">${idx + 1}. ${q.q}</div>
          <ul class="options-list" id="q${idx}-opts">
            ${q.opts.map((opt, j) => `<li class="option-row" onclick="selectOpt(${idx},${j},this)">${opt}</li>`).join('')}
          </ul>
        `
      });
      document.getElementById('quiz-content').innerHTML = html;
      document.getElementById('check-btn').style.display = "";
    }

    function selectOpt(qIdx, optIdx, elem) {
      answers[qIdx] = optIdx;
      const parent = document.getElementById(`q${qIdx}-opts`);
      [...parent.children].forEach(li => li.classList.remove("selected"));
      elem.classList.add("selected");
    }

    function showResult() {
      let score = 0;
      for (let i=0;i<quizData.length;i++) {
        if (answers[i] === null) {
          alert(`မေးခွန်း ${i+1} ကို ဖြေသေးပါ!`);
          return;
        }
        if (answers[i] == quizData[i].correct) score++;
      }
      let gif = "", title = "", desc = "";
      if (score >= 4) {
        gif = `<img class="result-gif" src="bu2.gif" alt="Cute laugh">`;
        title = "အမယ် မမကတော်လိုက်တာ အမှတ်ပြည့်ပဲနော်🙄🫶🏻";
        desc = `အမှတိ ${score}/5 မှတ် ရခဲ့တယ်!<br> ချစ်တယ်နော် 😘`;
      } else if (score === 3) {
        gif = `<img class="result-gif" src="cry.gif" alt="Try again cutie react">`;
        title = "ထပ်ကြိုးစားလိုက်အုံး မမ🙄";
        desc = `အမှတိ ${score}/5 မှတ် ရခဲ့တယ်!<br>နောက်တစ်ကြိမ်က ဒီထက်ပိုတော်မှာပေါ့ 💪🌟`;
      } else {
        gif = `<img class="result-gif" src="angry.gif" alt="sad cry">`;
        title = "တကယ်မချစ်လို့မှားနေတာမလား😡";
        desc = `အမှတိ ${score}/5 မှတ်.. မောင့်နဲ့ memory တွေ တော့ရှိရဲ့လား `;
      }
      document.getElementById('quiz-container').classList.add("hidden");
      document.getElementById('result-container').classList.remove("hidden");
      document.getElementById('result-frame').innerHTML =
        `${gif}<div class="result-title">${title}</div><div class="result-desc">${desc}</div>`;
    }
    // Real-time clear error if user starts typing again
    document.getElementById('passcode-input').addEventListener('input',function(){
      document.getElementById('passcode-error').textContent = "";
    });
  </script>
</body>
</html>
